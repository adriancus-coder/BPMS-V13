<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Live</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container participant-wrap participant-wrap-compact">
    <div class="panel hero-panel participant-hero participant-hero-compact">
      <div>
        <div class="eyebrow">BPMS Live Translate</div>
        <div class="header-logo">Participant</div>
        <div id="participantEventName" class="participant-event-name">Se conectează la eveniment...</div>
        <div id="participantEventMeta" class="participant-event-meta">Alege limba ta și urmărește traducerea live.</div>
      </div>
    </div>

    <div class="panel participant-top-bar">
      <div class="participant-top-grid">
        <div class="participant-top-field">
          <label>Limba mea</label>
          <select id="languageSelect">
            <option value="ro">Română</option>
            <option value="no" selected>Norvegiană</option>
            <option value="ru">Rusă</option>
            <option value="uk">Ucraineană</option>
            <option value="en">Engleză</option>
            <option value="es">Spaniolă</option>
          </select>
        </div>

        <div class="participant-top-actions">
          <button id="playAudioBtn" class="btn-green">Play audio</button>
          <button id="pauseAudioBtn" class="btn-dark">Pause audio</button>
        </div>

        <div class="participant-top-status">
          <div id="participantStatus" class="status">Conectare...</div>
          <div class="small">Pagina se reconectează singură când revii în ea.</div>
        </div>
      </div>
    </div>

    <div class="panel participant-history-panel">
      <div class="row space-between" style="margin-bottom:10px">
        <div class="small">Istoric</div>
        <button id="jumpToLiveBtn" class="btn-dark" style="display:none">Mergi la live</button>
      </div>
      <div id="history" class="history participant-history-scroll"></div>
    </div>

    <div class="panel participant-last-panel participant-live-panel">
      <div id="participantUpdatingBadge" class="participant-updating" style="display:none">
        Se actualizează...
      </div>

      <div class="small">Live acum</div>
      <div id="lastText" class="last-highlight participant-live-text" style="margin-top:12px">
        Aștept traducerea...
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/participant.js"></script>
</body>
</html>
