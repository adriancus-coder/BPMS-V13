<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Live</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container participant-wrap">
    <div class="panel hero-panel participant-hero">
      <div>
        <div class="eyebrow">BPMS Live Translate</div>
        <div class="header-logo">Participant</div>
        <div id="participantEventName" class="participant-event-name">Se conectează la eveniment...</div>
        <div id="participantEventMeta" class="participant-event-meta">Alege limba ta și urmărește traducerea live.</div>
      </div>
    </div>

    <div class="grid grid-3 compact-grid participant-controls">
      <div class="panel stack-gap">
        <label>Limba mea</label>
        <select id="languageSelect">
          <option value="no">Norvegiană</option>
          <option value="ru">Rusă</option>
          <option value="uk">Ucraineană</option>
          <option value="en">Engleză</option>
          <option value="es">Spaniolă</option>
        </select>
      </div>
      <div class="panel stack-gap">
        <button id="playAudioBtn" class="btn-green big">Play audio</button>
        <button id="pauseAudioBtn" class="btn-dark big">Pause audio</button>
      </div>
      <div class="panel stack-gap">
        <div id="participantStatus" class="status">Conectare...</div>
        <div class="small">Pagina se reconectează singură când revii în ea.</div>
      </div>
    </div>

    <div class="panel participant-last-panel">
      <div class="small">Ultima traducere</div>
      <div id="lastText" class="last-highlight compact-last" style="margin-top:12px">Aștept traducerea...</div>
      <div id="history" class="history compact-history"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/participant.js"></script>
</body>
</html>
